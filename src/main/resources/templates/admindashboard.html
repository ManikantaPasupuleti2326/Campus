<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <style>
  body {
  font-family: Arial, sans-serif;
  background-color: #f0f2f5;
  margin: 0;
  padding: 0;
  }

  .top-buttons {
  text-align: right;
  padding: 15px 25px;
  background-color: #003366;
  }

  .top-buttons a {
  color: white;
  background-color: #0059b3;
  padding: 10px 16px;
  margin-left: 10px;
  border-radius: 5px;
  text-decoration: none;
  font-weight: bold;
  }

  .top-buttons a:hover {
  background-color: #002147;
  }

  .admin-container {
  max-width: 95%;
  margin: 20px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  h2, h3 {
  text-align: center;
  color: #003366;
  }

  .form-section {
  margin: 30px 0;
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 10px;
  }

  .form-section form {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  }

  .form-section input {
  padding: 10px;
  font-size: 16px;
  width: 250px;
  border: 1px solid #ccc;
  border-radius: 5px;
  }

  button {
  padding: 10px 20px;
  background-color: green;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  }

  button.remove-btn {
  background-color: #d9534f;
  }

  button:hover {
  opacity: 0.9;
  }

  .table-section {
  overflow-x: auto;
  }

  table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
  font-size: 16px;
  }

  th, td {
  border: 1px solid #ccc;
  padding: 12px;
  text-align: left;
  white-space: nowrap;
  }

  th {
  background-color: #003366;
  color: white;
  }
  </style>

</head>
<body>



<!-- Top Navigation Buttons -->
<form action="/gane">
<div class="top-buttons">
  <a href="/home">Home</a>
  <a href="/admin">Workers List</a>
  <a href="/">Logout</a>
</div>

<div class="admin-container">
  <h2>Admin Dashboard</h2>

  <!-- Add Worker Form -->
  <div class="form-section">
    <h3>Add Worker</h3>
    <form action="/confirm"  th:object="${admin}"  method="post">
      WorkerId:<input  type="number" th:field="*{wid}"  placeholder="Enter Your wid"  required>
     Worker Name: <input type="text" th:field="*{wname}"  placeholder="Enter worker Name" required>
      MobileNo:<input type="number" th:field="*{mobileno}"  placeholder="Enter worker mobile no"  required>
       <button type="submit"><a href="/isu">Add Worker</a> </button>
    </form>
  </div>

  <!-- Remove Worker Form -->
  <div class="form-section">
    <h3>Remove Worker</h3>
    <form action="/removeWorker" method="post">
      <input type="text" name="workerID" placeholder="Worker ID" required>
      <button type="submit" class="remove-btn">Remove Worker</button>
    </form>
  </div>

  <!-- Complaints Table -->
  <div class="table-section">
    <h3>Student Complaints</h3>
    <table class="table">
      <thead>

      <tr>
        <th>Reg No</th>
        <th>Sname</th>
        <th>Roomno</th>
        <th>Dept</th>
        <th>Comp</th>
        <th>Des</th>

      </tr>
      </thead>

      <tbody>
      <tr th:each="tempStudent : ${List}">
        <td th:text="${tempStudent.getRegno()}"/>
        <td th:text="${tempStudent.getSname()}"/>
        <td th:text="${tempStudent.getRoomno()}"/>
        <td th:text="${tempStudent.getDept()}"/>
        <td th:text="${tempStudent.getComp()}"/>
        <td th:text="${tempStudent.getDes()}"/>

      </tr>

      </tbody>

    </table>


      </tbody>
    </table>
  </div>

</div>
</form>
</body>
</html>
