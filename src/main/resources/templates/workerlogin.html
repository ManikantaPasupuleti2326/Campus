
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Worker Login Form</title>
  <style>
  body {
  font-family: Arial, sans-serif;
  background-color: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  }

  .login-container {
  background-color: #fff;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
  text-align: center;
  width: 350px;
  }

  .login-container img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin-bottom: 15px;
  }

  .form-group {
  margin-bottom: 20px;
  text-align: left;
  }

  .form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
  }

  .form-group input {
  width: 100%;
  padding: 10px;
  box-sizing: border-box;
  }

  input[type="submit"] {
  background-color: #007bff;
  color: white;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
  width: 100%;
  font-size: 16px;
  }

  input[type="submit"]:hover {
  background-color: #0069d9;
  }

</style>
</head>
<body>
<form action="/studentList">
<div class="login-container">
  <img src="/images/WorkerLogo.jpg" alt="Worker Icon">
  <h2>Worker Login</h2>
  <form action="#" method="post">
    <div class="form-group">
      <label for="workerName">Worker Name</label>
      <input type="text" id="workerName" name="workerName" placeholder="Enter your name" required>
    </div>
    <div class="form-group">
      <label for="workerPassword">Password</label>
      <input type="password" id="workerPassword" name="workerPassword" placeholder="Enter your password" required>
    </div>
    <input type="submit" value="Login">
  </form>
</div>
</form>
</body>
</html>
