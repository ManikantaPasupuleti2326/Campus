<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Worker Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      padding: 40px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px 16px;
      text-align: left;
    }

    th {
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:hover {
      background-color: #e6f7ff;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Worker Details</h2>

<table class="table">
  <thead>
  <tr>
    <th>Worker ID</th>
    <th>Worker Name</th>
    <th>Mobile No</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="tempAdmin : ${List}">
    <td th:text="${tempAdmin.getWid()}"></td>
    <td th:text="${tempAdmin.getWname()}"></td>
    <td th:text="${tempAdmin.getMobileno()}"></td>
  </tr>
  </tbody>
</table>

</body>
</html>
