
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        Conversation opened. 1 unread message.


body {

    color: white;

}
#classBody{
 background:url('/images/vasavi2.jpg') no-repeat center ;
 background-size:cover;

.container {
    text-align: center;
    margin: 50px auto;
    padding: 40px;
    border-radius: 15px;
    width: 90%;
    max-width: 900px;
}

.mainhead {
    font-size: xx-large;
    font-weight: bold;
    color: rgb(49, 41, 41);
}


.title {
    font-size: 48px;
    margin-bottom: 30px;
    color: black;
}


.login-boxes {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;

}


.login-box {
    background-color: rgba(0, 110, 184, 0.2);
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
    width: 250px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
}
h2{
color: #fff;
}
.login-box h2 {

    color: #fff;
    margin: 15px 0;
}

.icon {


    width: 100px;
    height: auto;
    border-radius: 50%;
    margin-bottom: 10px;
}

.login-button {
    padding: 10px 20px;
    background-color: rgb(34, 219, 99);
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s ease;
}

.login-button:hover {
    background-color: green;
}
.ic{

}

.logo {
